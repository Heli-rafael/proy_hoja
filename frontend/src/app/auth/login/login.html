<div class="body">

    <div class="bg"></div>

    <div class="login-box">

        <div class="logo">
            PlantCare AI
        </div>

        <p>Inicia sesión para acceder al asistente inteligente de enfermedades vegetales.</p>
        
        <!-- FORMULARIO -->
        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">

            <!-- Email -->
            <div class="input-group">
                <input 
                    pInputText 
                    type="email"
                    formControlName="email" 
                    (blur)="onFieldBlur('email')" 
                    placeholder="Correo electrónico">
            </div>

            <!-- Contraseña -->
            <div class="input-group" style="display: flex; align-items: center; justify-content: center;">
                <p-password
                    formControlName="password"
                    [feedback]="false"
                    [toggleMask]="true"
                    placeholder="Contraseña"
                    inputStyl eClass="input-password"
                    (onBlur)="onFieldBlur('password')">
                </p-password>
            </div>

            <!-- Botón -->
            <button
                pButton
                type="submit"
                label="{{ processing.value ? 'Ingresando...' : 'Ingresar' }}"
                icon="{{ processing.value ? 'pi pi-spin pi-spinner' : 'pi pi-sign-in' }}"
                [disabled]="loginForm.invalid || processing.value"
                [style]="{'width':'100%', 'background-color': 'trasparent'}"
            >
            </button>             

        </form>

        
        <div class="divider">
            o continuar con
        </div>

        <div class="social">
            <!--
            <button
                pButton
                class="button-google"
                type="button"
                icon="pi pi-google"
                label="Google"
                (click)="loginWithGoogle()">
            </button>
            <button
                pButton
                class="button-google"
                type="button"
                icon="pi pi-facebook"
                label="Facebook"
                >
            </button> 
            -->
            <div id="googleButton">
                Facebook
            </div>  

        </div>

        <div class="extra">
            <a href="#">
                ¿Olvidaste tu contraseña?
            </a>
        </div>

    </div>

</div>
